# ============================================
# 下载安装流程说明 (Download/Install Process)
# ============================================
#
# 方式一：预下载（推荐）
#   1. ./download_sources.sh --common     # 先下载常用组件到 src/ 目录
#   2. ./install.sh                        # 安装时检测到已有文件会跳过下载
#
# 方式二：安装时自动下载
#   1. ./install.sh                        # 安装过程中自动下载
#
# ============================================
# 镜像源配置 (Mirror Configuration)
# ============================================

# 镜像基础 URL（可更换为其他镜像站）
# 国内镜像: 清华(tuna)、中科大(ustc)、阿里云(aliyun)
# 国际镜像: xtom (全球 CDN)
MIRROR_BASE_URL=https://mirrors.tuna.tsinghua.edu.cn

# 国内镜像:
# MIRROR_BASE_URL=https://mirrors.ustc.edu.cn
# MIRROR_BASE_URL=https://mirrors.aliyun.com
# 国际镜像:
# MIRROR_BASE_URL=https://mirrors.xtom.com

# ============================================
# 镜像源选择 (Mirror Selection)
# ============================================
#
# 自动检测：根据 IP 位置自动选择（国内用清华镜像，国外用官方源）
#   ./download_sources.sh nginx
#   ./install.sh
#
# 强制使用国内镜像：
#   ./download_sources.sh --china nginx
#   MIRROR_MODE=china ./install.sh
#
# 强制使用官方源：
#   ./download_sources.sh --official nginx
#   MIRROR_MODE=official ./install.sh
#
# 预下载配置见 sources.conf，版本号见 versions.txt
#
# ============================================

# set the default timezone
timezone=Asia/Shanghai

# Server scenario: vps (resource-limited VPS) or dedicated (dedicated server)
# This affects MySQL tuning parameters
server_scenario=vps

# Nginx and PHP-FPM process is run as $run_user(Default "www"), you can freely specify
run_user=www
# Nginx and PHP-FPM process is run as $run_group(Default "www"), you can freely specify
run_group=www

# set the default install path, you can freely specify
nginx_install_dir=/usr/local/nginx
tengine_install_dir=/usr/local/tengine
openresty_install_dir=/usr/local/openresty

mysql_install_dir=/usr/local/mysql
mariadb_install_dir=/usr/local/mariadb
pgsql_install_dir=/usr/local/pgsql

php_install_dir=/usr/local/php

nodejs_install_dir=/usr/local/node

pureftpd_install_dir=/usr/local/pureftpd

memcached_install_dir=/usr/local/memcached

redis_install_dir=/usr/local/redis

openssl_install_dir=/usr/local/openssl
imagick_install_dir=/usr/local/imagemagick
curl_install_dir=/usr/local/curl
freetype_install_dir=/usr/local/freetype

# Add modules
nginx_modules_options=''
php_modules_options=''

#########################################################################
# database data storage directory, you can freely specify
mysql_data_dir=/data/mysql
mariadb_data_dir=/data/mariadb
pgsql_data_dir=/data/pgsql

# web directory, you can customize
wwwroot_dir=/data/wwwroot

# nginx Generate a log storage directory, you can freely specify.
wwwlogs_dir=/data/wwwlogs

#########################################################################
# [MySQL/MariaDB] automatically generated, You can't change
dbrootpwd=

# [PostgreSQL] automatically generated, You can't change
dbpostgrespwd=

#########################################################################
# Backup Dest directory, change this if you have someother location
backup_dir=/data/backup

# How many days before the backup directory will be removed
expired_days=5

# local,remote,oss,cos,upyun,qiniu,s3,gdrive,dropbox
backup_destination=

# db ; web, You can't change
backup_content=

# aliyun OSS Bucket, You can't change
oss_bucket=

# qcloud OSS Bucket, You can't change
cos_bucket=

# qiniu Bucket, You can't change
qiniu_bucket=

# Amazon S3 Bucket, You can't change
s3_bucket=

# The backup of the database, You can't change
db_name=

# The backup of the website, You can't change
website_name=

# lnmp.tar.gz md5, You can't change
script_md5=
