# sources.conf - Download sources configuration for LNMP components
#
# Format:
#   component|official_url|china_mirror_url|filename|checksum_url|checksum_type|fallback_url|rename_dir
#
# Variables: {ver}, {ver_dash}, {ver_underscore}, {major}, {minor}
# Architecture: {arch_i} (ioncube: x86-64/aarch64), {arch_n} (nodejs: x64/arm64)
#
# checksum_type: sha256, sha1, md5, asc (pgp signature), or empty
# fallback_url: Optional fallback download URL (e.g., GitHub archive)
# rename_dir: Directory name after extraction if different from filename (for GitHub archives)
#
# Usage:
#   ./download_sources.sh <component>   # Download specific component
#   ./download_sources.sh --list        # List all available components
#   ./download_sources.sh --common      # Download common components
#   ./download_sources.sh --all         # Download all components
#
# Mirror Selection:
#   - Auto: Detect IP location automatically
#   - Manual: Set MIRROR_MODE=china or MIRROR_MODE=official in environment
#
# ============================================
# Web Server
# ============================================
nginx|https://nginx.org/download/nginx-{ver}.tar.gz|${MIRROR_BASE_URL}/nginx/nginx-{ver}.tar.gz|nginx-{ver}.tar.gz|https://nginx.org/download/nginx-{ver}.tar.gz.asc|asc
tengine|https://tengine.taobao.org/download/tengine-{ver}.tar.gz|https://tengine.taobao.org/download/tengine-{ver}.tar.gz|tengine-{ver}.tar.gz||
openresty|https://openresty.org/download/openresty-{ver}.tar.gz|${MIRROR_BASE_URL}/openresty/openresty-{ver}.tar.gz|openresty-{ver}.tar.gz|https://openresty.org/download/openresty-{ver}.tar.gz.asc|asc

